apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubepulse-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubepulse-app
  template:
    metadata:
      labels:
        app: kubepulse-app
    spec:
      containers:
      - name: app-container
        image: kubepulse-app:v5
        imagePullPolicy: Never
        ports:
        - containerPort: 3000