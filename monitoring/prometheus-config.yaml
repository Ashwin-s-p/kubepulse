apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    rule_files:
      - /etc/prometheus/alert-rule.yaml

    scrape_configs:
      - job_name: "kubepulse"
        metrics_path: /metrics
        static_configs:
          - targets: ["kubepulse-service:80"]